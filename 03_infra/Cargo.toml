[package]
name        = "typst-infra"
description = "I/O implementations for the Typst compiler"
version.workspace    = true
edition.workspace    = true
authors.workspace    = true
license.workspace    = true
repository.workspace = true

[dependencies]
typst-core = { path = "../01_core" }
thiserror  = { workspace = true }
ttf-parser  = { workspace = true }  # ADR-0019 — parsing de fontes
rustybuzz   = { workspace = true }  # ADR-0019 — shaping de texto
time        = { workspace = true }  # ADR-0021 — today() em SystemWorld
imagesize   = "0.12"                # leitura de cabeçalho de imagem — L3 apenas

[dev-dependencies]
# comemo: necessário para chamar eval() nos testes de integração (DEBT-6, Passo 32).
# Só em dev-dependencies — não entra em produção.
comemo = { workspace = true }
