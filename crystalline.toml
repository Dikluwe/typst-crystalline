[project]
root = "."

[languages]
rust = { grammar = "tree-sitter-rust", enabled = true }

# Mapeados — arquivos aqui são analisados e devem ter layer
[layers]
L0  = "00_nucleo"
L1  = "01_core"
L2  = "02_shell"
L3  = "03_infra"
L4  = "04_wiring"

# Excluídos — ignorados intencionalmente, não disparam V8
[excluded]
build = "target"
vcs   = ".git"
cargo = ".cargo"
lab   = "lab"   # quarentena — código original, não enforça regras cristalinas

[excluded_files]
license  = "LICENSE"
notice   = "NOTICE"
readme   = "README.md"
citation = "CITATION.cff"
cargo_lock   = "Cargo.lock"
clippy_toml  = "clippy.toml"
rustfmt_toml = "rustfmt.toml"
contributing = "CONTRIBUTING.md"
dockerfile   = "Dockerfile"

# Rust module name → layer
[module_layers]
entities  = "L1"
contracts = "L1"
rules     = "L1"
shell     = "L2"
infra     = "L3"

# Portas públicas de L1
[l1_ports]
entities  = "entities"
contracts = "contracts"
rules     = "rules"

[rules]
V0  = { level = "fatal" }
V1  = { level = "error" }
V2  = { level = "error" }
V3  = { level = "error" }
V4  = { level = "error" }
V5  = { level = "warning" }
V6  = { level = "warning" }
V7  = { level = "warning" }
V8  = { level = "fatal" }
V9  = { level = "error" }
V10 = { level = "fatal" }
V11 = { level = "warning" }  # Passo 5 — SystemWorld em L3 ainda não existe
V12 = { level = "warning" }
V13 = { level = "error" }
V14 = { level = "error" }

[l1_allowed_external]
# comemo: memoização incremental — decisão intencional, ver ADR-0001
# ecow: autorizado em L3 para conversão na fronteira; não entra em L1 (ADR-0004 Opção C)
# unicode_ident: UAX #31 (identificadores) — ADR-0010
# unicode_math_class: TR25 (classificação math) — ADR-0011
# unicode_script: UAX #24 (detecção de script) — ADR-0012
# unicode_segmentation: UAX #29 (grapheme clusters) — ADR-0013
rust = [
    "thiserror",
    "comemo",
    "unicode_ident",
    "unicode_math_class",
    "unicode_script",
    "unicode_segmentation",
]

[orphan_exceptions]
# ADRs não materializam código directamente
"00_nucleo/adr/adr-0001-estrategia-migracao.md" = "ADR — não materializa código"
# Template editorial — não materializa código directamente
"00_nucleo/prompts/template-prompts.md" = "template de prompt — contrato editorial, não materializa directamente"
# World e TrackedWorld — implementação concreta (SystemWorld) em L3 no Passo 5
"01_core/src/contracts/world.rs" = "implementação concreta (SystemWorld) em L3, Passo 5"
"01_core/contracts/world.rs" = "implementação concreta (SystemWorld) em L3, Passo 5"
# Prompts de Passo 3 que ainda não têm materialização em L3
"00_nucleo/prompts/package-spec-dto.md" = "materializa em L3, Passo 3 (typst-infra não existe ainda)"
"00_nucleo/prompts/shell.md" = "materializa em L2, passo futuro"
"00_nucleo/prompts/infra.md" = "materializa em L3, passo futuro"
"00_nucleo/prompts/wiring.md" = "materializa em L4, passo futuro"
